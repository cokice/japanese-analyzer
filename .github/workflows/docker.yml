name: CI and Docker

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: howenhowen/japanese-analyzer
  NODE_VERSION: "22"
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  validate:
    name: Test, lint, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Decide Docker publish mode
        id: publish
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          publish_ref=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            default_ref="refs/heads/${DEFAULT_BRANCH}"
            if [[ "${GITHUB_REF}" == "refs/heads/howendev/dev" || "${GITHUB_REF}" == "${default_ref}" || "${GITHUB_REF}" == refs/tags/* ]]; then
              publish_ref=true
            fi
          fi

          push_image=false
          if [[ "${publish_ref}" == "true" ]]; then
            if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
              push_image=true
            else
              echo "::warning::Docker Hub secrets are missing; the image will be built but not pushed."
            fi
          fi

          platforms="linux/amd64"
          if [[ "${publish_ref}" == "true" ]]; then
            platforms="${DOCKER_PLATFORMS}"
          fi

          echo "publish_ref=${publish_ref}" >> "${GITHUB_OUTPUT}"
          echo "push=${push_image}" >> "${GITHUB_OUTPUT}"
          echo "platforms=${platforms}" >> "${GITHUB_OUTPUT}"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ steps.publish.outputs.publish_ref == 'true' && !startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=sha-

      - name: Log in to Docker Hub
        if: steps.publish.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.publish.outputs.platforms }}
          push: ${{ steps.publish.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
