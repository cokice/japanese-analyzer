name: CI and Docker

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: howenhowen/japanese-analyzer
  NODE_VERSION: "22"

jobs:
  validate:
    name: Test, lint, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

  docker-plan:
    name: Prepare Docker build
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.publish.outputs.matrix }}
      publish_ref: ${{ steps.publish.outputs.publish_ref }}
      push: ${{ steps.publish.outputs.push }}

    steps:
      - name: Decide Docker publish mode
        id: publish
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          publish_ref=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            default_ref="refs/heads/${DEFAULT_BRANCH}"
            if [[ "${GITHUB_REF}" == "refs/heads/howendev/dev" || "${GITHUB_REF}" == "${default_ref}" || "${GITHUB_REF}" == refs/tags/* ]]; then
              publish_ref=true
            fi
          fi

          push_image=false
          if [[ "${publish_ref}" == "true" ]]; then
            if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
              push_image=true
            else
              echo "::warning::Docker Hub secrets are missing; the image will be built but not pushed."
            fi
          fi

          matrix='{"include":[{"platform":"linux/amd64","arch":"amd64","runner":"ubuntu-latest"}]}'
          if [[ "${publish_ref}" == "true" ]]; then
            matrix='{"include":[{"platform":"linux/amd64","arch":"amd64","runner":"ubuntu-latest"},{"platform":"linux/arm64","arch":"arm64","runner":"ubuntu-24.04-arm"}]}'
          fi

          echo "publish_ref=${publish_ref}" >> "${GITHUB_OUTPUT}"
          echo "push=${push_image}" >> "${GITHUB_OUTPUT}"
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  docker-meta:
    name: Generate Docker metadata
    runs-on: ubuntu-latest
    needs: docker-plan
    permissions:
      contents: read
    outputs:
      labels: ${{ steps.meta.outputs.labels }}
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ needs.docker-plan.outputs.publish_ref == 'true' && !startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=sha-

  docker-build:
    name: Build Docker image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs:
      - docker-plan
      - docker-meta
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.docker-plan.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: needs.docker-plan.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        if: needs.docker-plan.outputs.push != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ matrix.arch }}
          labels: ${{ needs.docker-meta.outputs.labels }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      - name: Build and push image digest
        id: build
        if: needs.docker-plan.outputs.push == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.docker-meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      - name: Export image digest
        if: needs.docker-plan.outputs.push == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${DIGEST#sha256:}"
          touch "${RUNNER_TEMP}/digests/${digest}"

      - name: Upload image digest
        if: needs.docker-plan.outputs.push == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: docker-digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Publish Docker manifest
    runs-on: ubuntu-latest
    needs:
      - docker-plan
      - docker-meta
      - docker-build
    if: needs.docker-plan.outputs.push == 'true'
    permissions:
      contents: read

    steps:
      - name: Download image digests
        uses: actions/download-artifact@v6
        with:
          path: ${{ runner.temp }}/digests
          pattern: docker-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-platform manifest
        env:
          DOCKER_METADATA_OUTPUT_TAGS: ${{ needs.docker-meta.outputs.tags }}
        shell: bash
        working-directory: ${{ runner.temp }}/digests
        run: |
          tags=()
          while IFS= read -r tag; do
            tags+=("-t" "${tag}")
          done <<< "${DOCKER_METADATA_OUTPUT_TAGS}"

          digests=()
          for digest in *; do
            digests+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create "${tags[@]}" "${digests[@]}"

      - name: Inspect published image
        env:
          DOCKER_METADATA_OUTPUT_VERSION: ${{ needs.docker-meta.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${DOCKER_METADATA_OUTPUT_VERSION}"
